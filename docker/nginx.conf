# ===========================================
#  REPRODUCTOR — NGINX CONFIG
# ===========================================
#  nginx hace dos cosas:
#    1. Sirve los archivos estáticos del frontend
#    2. Proxy reverso: /api/* → backend:4000
#
#  Así el frontend y la API comparten el mismo
#  origen (mismo dominio y puerto) y no hay
#  problemas de CORS en producción.
# ===========================================

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # --- Compresión gzip (mejora tiempos de carga) ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # --- Proxy reverso para la API ---
    #  Todo lo que llegue a /api/* se redirige al backend.
    #  backend:4000 es el nombre del servicio en la red
    #  interna de Docker (resuelto por el DNS de compose).
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # --- Assets estáticos ---
    #  Los archivos del build (JS, CSS, imágenes) se sirven
    #  directamente.  Cualquier ruta que no sea un archivo
    #  existente cae al index.html (SPA routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Página de error personalizada ---
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
