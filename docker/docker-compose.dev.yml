version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: reproductor-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-reproductor_db}
      POSTGRES_USER: ${DB_USER:-reproductor_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-reproductor_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../BackEnd/src/db/DataBases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-reproductor_user} -d ${DB_NAME:-reproductor_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - reproductor-network

  backend:
    build:
      context: ../BackEnd
      dockerfile: ../docker/Dockerfile.backend
      args:
        NODE_ENV: development
    container_name: reproductor-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DB_HOST=postgres
      - DB_USER=${DB_USER:-reproductor_user}
      - DB_PASSWORD=${DB_PASSWORD:-reproductor_pass}
      - DB_NAME=${DB_NAME:-reproductor_db}
      - DB_POOL_LIMIT=10
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - FMA_API_KEY=${FMA_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - PYTHON_SERVICE_URL=http://python-service:8000
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ../BackEnd:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - reproductor-network

  frontend:
    build:
      context: ../FrontEnd/mi-app
      dockerfile: ../docker/Dockerfile.frontend.dev
    container_name: reproductor-frontend-dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:4000/api
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../FrontEnd/mi-app:/app
      - /app/node_modules
    command: npm run dev -- --host
    networks:
      - reproductor-network

  python-service:
    build:
      context: ../python-services
      dockerfile: ../docker/Dockerfile.python
    container_name: reproductor-python-dev
    restart: unless-stopped
    ports:
      - "${PYTHON_PORT:-8000}:8000"
    volumes:
      - ../python-services:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - reproductor-network

volumes:
  postgres_data:
    driver: local

networks:
  reproductor-network:
    driver: bridge
