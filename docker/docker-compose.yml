# ====================================================================
#  REPRODUCTOR DE MÚSICA — PRODUCCIÓN
# ====================================================================
#  La idea es simple: cuatro servicios que se hablan entre sí a través
#  de una red interna.  Postgres guarda los datos, el backend sirve la
#  API, el servicio Python recomienda canciones, y nginx se encarga de
#  servir el frontend y pasar las llamadas /api/* al backend.
#
#  USO:
#    docker compose -f docker/docker-compose.yml up -d --build
#    docker compose -f docker/docker-compose.yml down
#
#  Para desarrollo usa docker-compose.dev.yml (tiene hot-reload).
# ====================================================================

services:
  # -------------------------------------------------------
  #  postgres — La base de datos del proyecto
  # -------------------------------------------------------
  #  Expone el puerto 5432 hacia el host en el puerto que
  #  definas en DB_PORT (por defecto 5432).  El SQL de
  #  arranque (DataBases.sql) se monta como init script
  #  para que las tablas existan desde el primer momento.
  # -------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: reproductor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-reproductor_db}
      POSTGRES_USER: ${DB_USER:-reproductor_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-reproductor_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../BackEnd/src/db/DataBases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-reproductor_user} -d ${DB_NAME:-reproductor_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - reproductor-network

  # -------------------------------------------------------
  #  backend — API Rest con Express
  # -------------------------------------------------------
  #  Expone rutas como /api/search, /api/plugins, /api/auth.
  #  Conecta a postgres a través del nombre del servicio
  #  (no necesita IP fija).  Los plugins de YouTube, Deezer,
  #  etc. se configuran vía variables de entorno.
  #
  #  Las variables que empiezan con ${SIN_FALLBACK} se leen
  #  del .env o del entorno del host.  Si no están definidas
  #  el backend igual arranca pero ciertos servicios quedan
  #  deshabilitados (con un warning en los logs).
  # -------------------------------------------------------
  backend:
    build:
      context: ../BackEnd
      dockerfile: ../docker/Dockerfile.backend
    container_name: reproductor-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DB_HOST=postgres
      - DB_USER=${DB_USER:-reproductor_user}
      - DB_PASSWORD=${DB_PASSWORD:-reproductor_pass}
      - DB_NAME=${DB_NAME:-reproductor_db}
      - DB_POOL_LIMIT=10
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - FMA_API_KEY=${FMA_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_key_reproductor_2026}
      - PYTHON_SERVICE_URL=http://python-service:8000
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (r) => { let d=''; r.on('data',c=>d+=c); r.on('end',()=>process.exit(JSON.parse(d).status==='ok'?0:1)) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - reproductor-network

  # -------------------------------------------------------
  #  python-service — Motor de recomendaciones
  # -------------------------------------------------------
  #  Servicio FastAPI que genera recomendaciones basadas en
  #  el catálogo interno.  El backend lo llama cuando el
  #  usuario pide sugerencias.  Tiene su propio healthcheck.
  # -------------------------------------------------------
  python-service:
    build:
      context: ../python-services
      dockerfile: ../docker/Dockerfile.python
    container_name: reproductor-python
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - reproductor-network

  # -------------------------------------------------------
  #  frontend — SPA servida por nginx
  # -------------------------------------------------------
  #  El frontend se construye en una etapa multi-stage
  #  (build con Node, runtime con nginx).  nginx también
  #  hace de proxy reverso: cualquier llamada a /api/* se
  #  redirige al backend.  Así el frontend y la API
  #  comparten el mismo dominio y no hay problemas de CORS.
  #
  #  VITE_API_URL va vacío por defecto para que el frontend
  #  use rutas relativas (/api/*) y todo pase por nginx.
  #  Si necesitas apuntar directo al backend (ej: desarrollo
  #  sin nginx) pásalo como http://localhost:4000.
  # -------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: reproductor-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - reproductor-network

volumes:
  postgres_data:
    driver: local

networks:
  reproductor-network:
    driver: bridge
